              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            responseTemplates:
              application/json: |
                {}
    post:
      tags:
        - Admin
      summary: Create a prompt version
      operationId: admin_create_prompt_POST
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - category
                - block_type
                - prompt_text
              properties:
                category:
                  type: string
                  description: Prompt category (e.g., "student_chat", "case_summary")
                block_type:
                  type: string
                  description: Block type for the prompt
                prompt_text:
                  type: string
                  description: The prompt content
                version_name:
                  type: string
                  description: Optional human-friendly version name
                author_id:
                  type: string
                  description: Optional author id
      responses:
        "200":
          description: Prompt version created
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt_version_id:
                    type: integer
                  category:
                    type: string
                  block_type:
                    type: string
                  version_number:
                    type: integer
                  version_name:
                    type: string
                  prompt_text:
                    type: string
                  author_id:
                    type: string
                  is_active:
                    type: boolean
        "400":
          description: Invalid value
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
