            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            responseTemplates:
              application/json: |
                {}
    get:
      tags:
        - Student
      summary: Get a case page (case, messages, summaries)
      operationId: get_case_page_GET
      parameters:
        - in: query
          name: case_id
          required: true
          schema:
            type: string
        - in: query
          name: cognito_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Case page retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  caseData:
                    type: object
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        content:
                          type: string
                  summaries:
                    type: array
                    items:
                      type: object
        "400":
          description: Bad Request
        "403":
          description: Access denied
        "404":
          description: Case not found
        "500":
          description: Internal Server Error
      security:
        - studentAuthorizer: []
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${studentFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /student/view_case:
    options:
