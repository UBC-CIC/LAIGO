                type: array
                items:
                  type: object
                  properties:
                    prompt_version_id:
                      type: integer
                    category:
                      type: string
                    block_type:
                      type: string
                    version_number:
                      type: integer
                    version_name:
                      type: string
                    prompt_text:
                      type: string
                    author_id:
                      type: string
                    time_created:
                      type: string
                    is_active:
                      type: boolean
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

    put:
      tags:
        - Admin
      summary: Update a prompt version
      operationId: admin_update_prompt_PUT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt_version_id
              properties:
                prompt_version_id:
                  type: string
                  description: The ID of the prompt version to update
                prompt_text:
                  type: string
                  description: Updated prompt content
                version_name:
                  type: string
                  description: Updated version name
      responses:
        "200":
          description: Prompt version updated
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request
        "404":
          description: Prompt version not found
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

    delete:
      tags:
        - Admin
      summary: Delete a prompt version
      operationId: admin_delete_prompt_DELETE
      parameters:
        - in: query
          name: prompt_version_id
          required: true
          schema:
            type: integer
          description: The id of the prompt version to delete
      responses:
        "200":
          description: Prompt deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  category:
                    type: string
                  block_type:
                    type: string
        "400":
          description: Cannot delete active prompt or invalid request
        "404":
          description: Prompt version not found
        "500":
