openapi: 3.0.0
info:
  title: LAIGO API
  version: 1.0.0
  description: API for LAIGO AI Assistant with role-based access control
tags:
  - name: Student
    description: endpoints accessible by students
  - name: Instructor
    description: endpoints accessible by instructors
  - name: Admin
    description: endpoints accessible by admins
x-amazon-apigateway-request-validators:
  all:
    validateRequestParameters: true
    validateRequestBody: true
  params-only:
    validateRequestParameters": true
    validateRequestBody": false
x-amazon-apigateway-request-validator: params-only
x-amazon-apigateway-gateway-responses:
  UNAUTHORIZED:
    statusCode: "401"
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Headers: "'*'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'*'"
      gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
    responseTemplates:
      application/json: |
        {"message":$context.error.messageString}
x-common-options: &commonOptions
  options:
    summary: CORS support
    description: |
      Enable CORS by returning correct headers
    responses:
      200:
        $ref: "#/components/responses/Success"
    x-amazon-apigateway-integration:
      type: mock
      requestTemplates:
        application/json: |
          {
            "statusCode" : 200
          }
      responses:
        default:
          statusCode: "200"
          responseParameters:
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
            method.response.header.Access-Control-Allow-Methods: "'*'"
            method.response.header.Access-Control-Allow-Origin: "'*'"
          responseTemplates:
            application/json: |
              {}

components:
  securitySchemes:
    adminAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: custom
      x-amazon-apigateway-authorizer:
        type: token
        authorizerUri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminLambdaAuthorizer.Arn}/invocations
        authorizerResultTtlInSeconds: 300

    instructorAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: custom
      x-amazon-apigateway-authorizer:
        type: token
        authorizerUri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${instructorLambdaAuthorizer.Arn}/invocations
        authorizerResultTtlInSeconds: 300

    studentAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: custom
      x-amazon-apigateway-authorizer:
        type: token
        authorizerUri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${studentLambdaAuthorizer.Arn}/invocations
        authorizerResultTtlInSeconds: 300

  responses:
    Success:
      description: Request success
      headers:
        Access-Control-Allow-Origin:
          schema:
            type: string
        Access-Control-Allow-Methods:
          schema:
            type: string
        Access-Control-Allow-Headers:
          schema:
            type: string

paths:
  /admin/health:
    get:
      summary: Admin health check
      security:
        - adminAuthorizer: []
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: 200
            responseTemplates:
              application/json: '{"status": "ok", "role": "admin"}'
      responses:
        "200":
          description: Success

  /admin/prompt:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            responseTemplates:
              application/json: |
                {}
    post:
      tags:
        - Admin
      summary: Create a prompt version
      operationId: admin_create_prompt_POST
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - category
                - block_type
                - prompt_text
              properties:
                category:
                  type: string
                  description: Prompt category (e.g., "student_chat", "case_summary")
                block_type:
                  type: string
                  description: Block type for the prompt
                prompt_text:
                  type: string
                  description: The prompt content
                version_name:
                  type: string
                  description: Optional human-friendly version name
                author_id:
                  type: string
                  description: Optional author id
      responses:
        "200":
          description: Prompt version created
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt_version_id:
                    type: integer
                  category:
                    type: string
                  block_type:
                    type: string
                  version_number:
                    type: integer
                  version_name:
                    type: string
                  prompt_text:
                    type: string
                  author_id:
                    type: string
                  is_active:
                    type: boolean
        "400":
          description: Invalid value
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

    get:
      tags:
        - Admin
      summary: List all prompt versions
      operationId: admin_list_prompts_GET
      responses:
        "200":
          description: List of prompt versions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    prompt_version_id:
                      type: integer
                    category:
                      type: string
                    block_type:
                      type: string
                    version_number:
                      type: integer
                    version_name:
                      type: string
                    prompt_text:
                      type: string
                    author_id:
                      type: string
                    time_created:
                      type: string
                    is_active:
                      type: boolean
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/prompt/active:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            responseTemplates:
              application/json: |
                {}
    get:
      tags:
        - Admin
      summary: Get only active prompts
      operationId: admin_active_prompts_GET
      responses:
        "200":
          description: List of active prompts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    prompt_version_id:
                      type: integer
                    category:
                      type: string
                    block_type:
                      type: string
                    version_number:
                      type: integer
                    version_name:
                      type: string
                    prompt_text:
                      type: string
                    time_created:
                      type: string
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/prompt/activate:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            responseTemplates:
              application/json: |
                {}
    post:
      tags:
        - Admin
      summary: Activate a prompt version
      operationId: admin_activate_prompt_POST
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt_version_id
              properties:
                prompt_version_id:
                  type: integer
                  description: The id of the prompt version to activate
      responses:
        "200":
          description: Prompt activated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  category:
                    type: string
                  block_type:
                    type: string
        "400":
          description: Invalid value
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /instructor/health:
    get:
      summary: Instructor health check
      security:
        - instructorAuthorizer: []
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: 200
            responseTemplates:
              application/json: '{"status": "ok", "role": "instructor"}'
      responses:
        "200":
          description: Success

  /student/health:
    get:
      summary: Student health check
      security:
        - studentAuthorizer: []
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: 200
            responseTemplates:
              application/json: '{"status": "ok", "role": "student"}'
      responses:
        "200":
          description: Success

  /student/get_cases:
    get:
      summary: List cases for the authenticated student
      security:
        - studentAuthorizer: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${studentFunction.Arn}/invocations
        httpMethod: POST
        type: aws_proxy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  cases:
                    type: array
                    items:
                      type: object
                  pagination:
                    type: object
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            responseTemplates:
              application/json: |
                {}

  /student/new_case:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'*'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            responseTemplates:
              application/json: |
                {}
    post:
      tags:
        - Student
      summary: Create a case for a student
      operationId: student_create_case_POST
      parameters:
        - in: query
          name: user_id
          required: true
          description: id of the student (cognito_id)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - case_title
                - case_type
                - jurisdiction
                - case_description
                - province
                - statute
              properties:
                case_title:
                  type: string
                  description: Title of the case
                case_type:
                  type: string
                  description: Type of the case
                jurisdiction:
                  type: string
                  description: Jurisdiction for the case
                case_description:
                  type: string
                  description: Detailed description of the case
                province:
                  type: string
                  description: Province related to the case
                statute:
                  type: string
                  description: Statute related to the case
      responses:
        "200":
          description: Case created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  case_id:
                    type: string
                    description: The ID of the created case
                  case_hash:
                    type: string
                    description: The hash generated for the case
                  case_title:
                    type: string
                    description: The title of the created case
        "400":
          description: Invalid value
        "401":
          description: Unauthorized
        "429":
          description: Too Many Requests
        "500":
          description: Internal Server Error
      security:
        - studentAuthorizer: []
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseGenLambdaDockerFunc.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /student/edit_case:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'*'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            responseTemplates:
              application/json: |
                {}
    put:
      tags:
        - Student
      summary: Update notes in a session
      operationId: update_case_PUT
      parameters:
        - in: query
          name: case_id
          required: true
          schema:
            type: string
          description: The ID of the case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                case_title:
                  type: string
                case_description:
                  type: string
                case_type:
                  type: string
                status:
                  type: string
                jurisdiction:
                  type: array
                  items:
                    type: string
                province:
                  type: string
                statute:
                  type: string
      responses:
        "200":
          description: Case updated successfully
        "400":
          description: Bad Request
        "404":
          description: Case not found
        "500":
          description: Internal Server Error
      security:
        - studentAuthorizer: []
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${studentFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /student/case_page:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
