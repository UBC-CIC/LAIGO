              method.response.header.Access-Control-Allow-Methods: "'PUT,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
            responseTemplates:
              application/json: |
                {}
    put:
      tags:
        - Student
      summary: Record that a student viewed a case
      operationId: put_view_case_PUT
      parameters:
        - in: query
          name: case_id
          required: true
